<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="google-adsense-account" content="ca-pub-8275641937649551">
    <meta name="monetag" content="8eecf201ca29a630232ba4e117b33e26">

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Admin Login — Free Downloader Analytics" />
    <title>Login — Free Downloader Admin</title>

    <link rel="icon" href="https://i.ibb.co.com/B2rrTdTx/Gemini-Generated-Image-hr007shr007shr00.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet" />

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                    colors: {
                        panel: {
                            bg: '#0b0f19',
                            surface: '#111827',
                            card: '#1a2232',
                            border: '#1f2937',
                            hover: '#243044',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Animated gradient orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: .25;
            animation: float 8s ease-in-out infinite;
        }

        .orb-1 {
            width: 400px; height: 400px;
            background: #6366f1;
            top: -10%; left: -5%;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 350px; height: 350px;
            background: #06b6d4;
            bottom: -10%; right: -5%;
            animation-delay: -4s;
        }

        .orb-3 {
            width: 250px; height: 250px;
            background: #8b5cf6;
            top: 50%; left: 60%;
            animation-delay: -2s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50%      { transform: translateY(-30px) scale(1.05); }
        }

        /* Glass card */
        .glass {
            background: rgba(17, 24, 39, .65);
            backdrop-filter: blur(24px) saturate(1.3);
            -webkit-backdrop-filter: blur(24px) saturate(1.3);
        }

        /* Input focus ring */
        .input-field:focus {
            box-shadow: 0 0 0 2px rgba(99, 102, 241, .45);
        }

        /* Button shine sweep */
        .btn-shine {
            position: relative;
            overflow: hidden;
        }
        .btn-shine::after {
            content: '';
            position: absolute;
            top: 0; left: -75%;
            width: 50%; height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255,255,255,.15), transparent);
            transition: left .5s;
        }
        .btn-shine:hover::after {
            left: 125%;
        }

        /* Shake animation for error */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }
        .shake { animation: shake .4s ease-in-out; }
    </style>
</head>

<body class="bg-panel-bg text-gray-100 font-sans antialiased min-h-screen flex items-center justify-center relative overflow-hidden">

    <!-- Background orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Login card -->
    <div id="login-card" class="glass border border-panel-border rounded-3xl shadow-2xl w-full max-w-md mx-4 p-8 md:p-10 relative z-10">

        <!-- Logo -->
        <div class="flex flex-col items-center mb-8">
            <div class="w-16 h-16 rounded-full bg-panel-card border border-panel-border overflow-hidden shadow-[0_0_20px_rgba(99,102,241,0.6)] flex items-center justify-center mb-4">
                <img src="https://i.ibb.co.com/B2rrTdTx/Gemini-Generated-Image-hr007shr007shr00.png" alt="Logo" class="w-full h-full object-cover" />
            </div>
            <h1 class="text-xl font-bold text-white tracking-tight">Free Downloader</h1>
            <p class="text-sm text-gray-500 mt-1">Sign in to your admin panel</p>
        </div>

        <!-- Flash messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="mb-5 px-4 py-3 rounded-xl text-sm font-medium
                        {% if category == 'error' %}
                            bg-red-500/10 border border-red-500/30 text-red-400
                        {% else %}
                            bg-emerald-500/10 border border-emerald-500/30 text-emerald-400
                        {% endif %}
                        shake" role="alert">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <!-- Form -->
        <form method="POST" action="/login" class="space-y-5">

            <!-- Email -->
            <div>
                <label for="email" class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Email Address</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-500">
                        <svg class="w-4.5 h-4.5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />
                        </svg>
                    </span>
                    <input id="email" name="email" type="email" required autocomplete="email"
                        placeholder="admin@freedownloader.top"
                        class="input-field w-full pl-11 pr-4 py-3 bg-panel-card border border-panel-border rounded-xl text-sm text-white placeholder-gray-600 outline-none transition-all duration-200 focus:border-indigo-500/50 hover:border-gray-600" />
                </div>
            </div>

            <!-- Password -->
            <div>
                <label for="password" class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-500">
                        <svg class="w-4.5 h-4.5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
                        </svg>
                    </span>
                    <input id="password" name="password" type="password" required autocomplete="current-password"
                        placeholder="••••••••••••"
                        class="input-field w-full pl-11 pr-12 py-3 bg-panel-card border border-panel-border rounded-xl text-sm text-white placeholder-gray-600 outline-none transition-all duration-200 focus:border-indigo-500/50 hover:border-gray-600" />
                    <!-- Toggle visibility -->
                    <button type="button" id="toggle-pw" onclick="togglePassword()"
                        class="absolute inset-y-0 right-0 flex items-center pr-4 text-gray-500 hover:text-gray-300 transition-colors">
                        <svg id="eye-open" class="w-4.5 h-4.5" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                        <svg id="eye-closed" class="w-4.5 h-4.5 hidden" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Submit -->
            <button type="submit" id="login-btn"
                class="btn-shine w-full py-3.5 bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 text-white text-sm font-bold rounded-xl transition-all duration-200 shadow-lg shadow-indigo-600/25 hover:shadow-indigo-500/40 tracking-wide">
                Sign In
            </button>
        </form>

        <!-- Footer -->
        <p class="text-center text-xs text-gray-600 mt-8">
            &copy; 2026 Free Downloader &middot; Admin Access Only
        </p>
    </div>

    <script>
        function togglePassword() {
            const pw   = document.getElementById('password');
            const open = document.getElementById('eye-open');
            const shut = document.getElementById('eye-closed');
            if (pw.type === 'password') {
                pw.type = 'text';
                open.classList.add('hidden');
                shut.classList.remove('hidden');
            } else {
                pw.type = 'password';
                open.classList.remove('hidden');
                shut.classList.add('hidden');
            }
        }
    </script>
</body>

</html>
