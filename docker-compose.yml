services:
  # ── Infrastructure ──────────────────────────────────────────
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: downloader_analytics
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - fdl_network

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - fdl_network

  phpmyadmin:
    image: phpmyadmin:latest
    restart: always
    ports:
      - "8080:80"
    environment:
      - PMA_HOST=db
    depends_on:
      - db
    networks:
      - fdl_network

  # ── Unified (একটি মাত্র gunicorn — সব পোর্ট) ──────────────────
  unified:
    build: .
    command: gunicorn -c infra/gunicorn.conf.py unified_app:application
    ports:
      - "8004:8004"   # yt_d
      - "8001:8001"   # fb_d
      - "8002:8002"   # insta_d
      - "8003:8003"   # tik_d
      - "8009:8009"   # p_d
      - "5000:5000"   # backend
      - "8010:8010"   # freeStore
      - "5007:5007"   # donate_app
      - "8008:8008"   # free_d
    environment:
      - DB_HOST=db
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH}
      - SECRET_KEY=${SECRET_KEY}
      - PAYMENT_MODE=${PAYMENT_MODE:-sandbox}
    volumes:
      - ./yt_d/downloads:/app/yt_d/downloads
      - ./yt_d/cookies.txt:/app/yt_d/cookies.txt:ro
      - ./yt_d/po_token.txt:/app/yt_d/po_token.txt:ro
      - ./fb_downloader/downloads:/app/fb_downloader/downloads
      - ./fb_downloader/cookies.txt:/app/fb_downloader/cookies.txt:ro
      - ./insta_d/downloads:/app/insta_d/downloads
      - ./insta_d/cookies.txt:/app/insta_d/cookies.txt:ro
      - ./tik_d/downloads:/app/tik_d/downloads
      - ./tik_d/cookies.txt:/app/tik_d/cookies.txt:ro
      - ./p_d/downloads:/app/p_d/downloads
      - ./freeStore/uploads:/app/freeStore/uploads
    depends_on:
      - redis
      - db
    networks:
      - fdl_network
    deploy:
      resources:
        limits:
          memory: 600M

  # ── Celery Worker ───────────────────────────────────────────
  yt_worker:
    build: .
    command: celery -A yt_d.tasks worker --loglevel=info -Q yt_d_queue --concurrency=1
    environment:
      - DB_HOST=db
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    depends_on:
      - redis
      - db
    networks:
      - fdl_network
    deploy:
      resources:
        limits:
          memory: 300M

networks:
  fdl_network:
    driver: bridge

volumes:
  db_data:
