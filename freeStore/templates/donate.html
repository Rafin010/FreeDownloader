<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Us - Free Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .gradient-text {
            background: linear-gradient(to right, #10b981, #3b82f6);
            -webkit-background-clip: text;
            color: transparent;
        }
        .gradient-bg { background: linear-gradient(to right, #10b981, #3b82f6); }
        .tier-label input:checked + div {
            border-color: #10b981;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.3);
            background: rgba(16, 185, 129, 0.1);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 antialiased min-h-screen flex items-center justify-center relative overflow-hidden">
    
    <!-- Animated Orbs -->
    <div class="absolute top-1/4 left-1/4 w-[400px] h-[400px] bg-emerald-600/20 rounded-full blur-[100px] pointer-events-none"></div>
    <div class="absolute bottom-1/4 right-1/4 w-[400px] h-[400px] bg-blue-600/20 rounded-full blur-[100px] pointer-events-none"></div>

    <div class="relative z-10 w-full max-w-2xl px-6 py-12">
        <div class="bg-slate-900/80 backdrop-blur-xl border border-slate-700/50 p-8 md:p-12 rounded-3xl shadow-2xl">
            
            <div class="text-center mb-10">
                <div class="w-16 h-16 mx-auto bg-slate-800 rounded-full flex items-center justify-center mb-4 shadow-lg border border-slate-700">
                    <svg class="w-8 h-8 text-emerald-400" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clip-rule="evenodd" /></svg>
                </div>
                <h1 class="text-3xl font-black text-white mb-3">Support Our Mission</h1>
                <p class="text-slate-400 text-sm leading-relaxed max-w-md mx-auto">
                    Help us keep this service 100% free! Your small donation covers server costs and supports future development. A portion goes directly to charity.
                </p>
            </div>

            <form action="/donate/process" method="POST" class="space-y-8">
                
                <!-- Donation Tiers -->
                <div class="grid grid-cols-3 gap-4">
                    <label class="tier-label cursor-pointer text-center group">
                        <input type="radio" name="amount" value="2" class="hidden" checked>
                        <div class="border-2 border-slate-700 bg-slate-800/50 rounded-2xl p-4 transition-all hover:bg-slate-800 group-hover:border-emerald-500/50">
                            <div class="text-2xl font-black text-white mb-1"><span class="text-sm text-emerald-400">$</span>2</div>
                            <div class="text-xs text-slate-400 font-medium">Coffee</div>
                        </div>
                    </label>
                    <label class="tier-label cursor-pointer text-center group">
                        <input type="radio" name="amount" value="5" class="hidden">
                        <div class="border-2 border-slate-700 bg-slate-800/50 rounded-2xl p-4 transition-all hover:bg-slate-800 group-hover:border-emerald-500/50">
                            <div class="text-2xl font-black text-white mb-1"><span class="text-sm text-emerald-400">$</span>5</div>
                            <div class="text-xs text-slate-400 font-medium">Lunch</div>
                        </div>
                    </label>
                    <label class="tier-label cursor-pointer text-center group">
                        <input type="radio" name="amount" value="8" class="hidden">
                        <div class="border-2 border-slate-700 bg-slate-800/50 rounded-2xl p-4 transition-all hover:bg-slate-800 group-hover:border-emerald-500/50">
                            <div class="text-2xl font-black text-white mb-1"><span class="text-sm text-emerald-400">$</span>8</div>
                            <div class="text-xs text-slate-400 font-medium">Server</div>
                        </div>
                    </label>
                </div>

                <!-- Custom Amount -->
                <div class="relative">
                    <div class="flex absolute inset-y-0 left-0 items-center pl-4 pointer-events-none">
                        <span class="text-emerald-400 font-bold">$</span>
                    </div>
                    <input type="number" name="custom_amount" min="1" step="0.5" placeholder="Or enter custom amount..." 
                           class="bg-slate-900 border border-slate-700 text-white text-sm rounded-xl focus:ring-emerald-500 focus:border-emerald-500 block w-full pl-10 p-3.5 placeholder-slate-500 transition-colors">
                </div>

                <!-- Payment Methods -->
                <div>
                    <p class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-4 text-center">Select Payment Method</p>
                    <div class="grid grid-cols-2 gap-4">
                        <button type="button" class="bg-slate-900 border border-slate-700 hover:border-blue-500 rounded-xl p-4 text-center transition-all flex items-center justify-center gap-2">
                            <svg class="w-6 h-6 text-blue-500" viewBox="0 0 24 24" fill="currentColor"><path d="M7.1 19.3L4.9 14h2.1l1 2.9h.1l1.5-2.9h2l-2.6 4.3 2.7 4.7h-2.1l-1.6-3.1h-.1l-1.1 3.1H4.9l2.2-3.7z"/></svg>
                            <span class="font-bold text-slate-200">PayPal</span>
                        </button>
                        <button type="button" class="bg-slate-900 border border-slate-700 hover:border-purple-500 rounded-xl p-4 text-center transition-all flex items-center justify-center gap-2">
                            <svg class="w-6 h-6 text-purple-500" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.486 2 2 6.486 2 12s4.486 10 10 10 10-4.486 10-10S17.514 2 12 2zm4 11h-3v3c0 .553-.448 1-1 1s-1-.447-1-1v-3H8c-.552 0-1-.447-1-1s.448-1 1-1h3V8c0-.553.448-1 1-1s1 .447 1 1v3h3c.553 0 1 .447 1 1s-.447 1-1 1z"/></svg>
                            <span class="font-bold text-slate-200">Card</span>
                        </button>
                    </div>
                </div>

                <div class="pt-4">
                    <button type="submit" class="w-full gradient-bg text-white font-bold py-4 rounded-xl shadow-[0_0_20px_rgba(16,185,129,0.3)] hover:shadow-[0_0_25px_rgba(59,130,246,0.5)] transition-all transform hover:-translate-y-0.5 tracking-widest uppercase">
                        Donate Securely
                    </button>
                    <p class="text-[10px] text-center text-slate-500 mt-4 flex justify-center items-center gap-1">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                        SSL Encrypted Payment
                    </p>
                </div>
            </form>
            
        </div>
    </div>
    
    <script>
        // Clear custom amount if radio selected
        document.querySelectorAll('input[name="amount"]').forEach(radio => {
            radio.addEventListener('change', () => {
                document.querySelector('input[name="custom_amount"]').value = '';
            });
        });
        
        // Uncheck radios if custom amount entered
        document.querySelector('input[name="custom_amount"]').addEventListener('input', (e) => {
            if (e.target.value) {
                document.querySelectorAll('input[name="amount"]').forEach(r => r.checked = false);
            }
        });
    </script>
</body>
</html>
