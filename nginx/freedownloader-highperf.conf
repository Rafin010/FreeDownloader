# ============================================================
# HIGH-PERFORMANCE NGINX CONFIG FOR FREEDOWNLOADER.TOP
# Optimized for 1000+ concurrent downloads
# ============================================================
# Place at: /etc/nginx/conf.d/freedownloader-highperf.conf
# Then: sudo nginx -t && sudo systemctl reload nginx
# ============================================================

# ── Connection Tuning ─────────────────────────────────────────
# (Place in the 'events' block of /etc/nginx/nginx.conf)
# events {
#     worker_connections 4096;
#     multi_accept on;
#     use epoll;
# }

# ── Rate Limiting Zones (Defense in Depth) ────────────────────
# Applied BEFORE requests reach Flask — blocks abuse at the edge
limit_req_zone $binary_remote_addr zone=api_info:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=api_download:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_status:10m rate=120r/m;
limit_conn_zone $binary_remote_addr zone=download_conn:10m;

# ── Upstream Definitions ──────────────────────────────────────
upstream yt_backend {
    server 127.0.0.1:8001;
    keepalive 32;
}

upstream fb_backend {
    server 127.0.0.1:8002;
    keepalive 32;
}

upstream tik_backend {
    server 127.0.0.1:8003;
    keepalive 32;
}

upstream insta_backend {
    server 127.0.0.1:8004;
    keepalive 32;
}

upstream pd_backend {
    server 127.0.0.1:8005;
    keepalive 32;
}

# ── Shared Server Settings ────────────────────────────────────
# Include this in each server {} block

# === YOUTUBE ===
server {
    listen 80;
    server_name y.freedownloader.top;

    # SSL managed by Certbot - add your SSL block here
    # listen 443 ssl;
    # ssl_certificate /etc/letsencrypt/live/y.freedownloader.top/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/y.freedownloader.top/privkey.pem;

    # ── Proxy Settings ────────────────────────────────────────
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── Timeouts ──────────────────────────────────────────────
    proxy_connect_timeout 10s;
    proxy_read_timeout 300s;       # 5 min for long downloads
    proxy_send_timeout 300s;

    # ── Buffering ─────────────────────────────────────────────
    proxy_buffering off;           # DON'T buffer streaming responses
    proxy_request_buffering off;
    client_max_body_size 10m;

    # ── Security Headers ──────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── API Rate Limits ───────────────────────────────────────
    location /api/get_info {
        limit_req zone=api_info burst=5 nodelay;
        proxy_pass http://yt_backend;
    }

    location /api/download {
        limit_req zone=api_download burst=3 nodelay;
        limit_conn download_conn 3;    # Max 3 simultaneous downloads per IP
        proxy_pass http://yt_backend;
    }

    location /api/download_async {
        limit_req zone=api_download burst=5 nodelay;
        proxy_pass http://yt_backend;
    }

    location /api/task_status/ {
        limit_req zone=api_status burst=10 nodelay;
        proxy_pass http://yt_backend;
    }

    location /api/download_file/ {
        limit_req zone=api_download burst=3 nodelay;
        limit_conn download_conn 3;
        proxy_pass http://yt_backend;
    }

    location /api/thumb_proxy {
        limit_req zone=api_status burst=20 nodelay;
        proxy_pass http://yt_backend;
        # Cache thumbnails at nginx level
        proxy_cache_valid 200 1h;
    }

    # ── Static Assets (cached aggressively) ───────────────────
    location ~* \.(css|js|woff|woff2|ttf|eot|otf)$ {
        proxy_pass http://yt_backend;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|avif)$ {
        proxy_pass http://yt_backend;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # ── Default ───────────────────────────────────────────────
    location / {
        proxy_pass http://yt_backend;
    }
}

# NOTE: Duplicate the server block above for each subdomain:
# - f.freedownloader.top → fb_backend (port 8002)
# - t.freedownloader.top → tik_backend (port 8003)
# - i.freedownloader.top → insta_backend (port 8004)
# - p.freedownloader.top → pd_backend (port 8005)
# Just change server_name, upstream reference, and SSL paths.
