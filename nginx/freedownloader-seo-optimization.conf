# --- PASTE START ---

# Static Assets: CSS, JS, Fonts (1 year cache)
location ~* \.(css|js|woff|woff2|ttf|eot|otf)$ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    add_header X-Content-Type-Options "nosniff";
    access_log off;
}

# Images (30 day cache)
location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|avif)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
    add_header X-Content-Type-Options "nosniff";
    access_log off;
}

# Video/Audio downloads (7 day cache)
location ~* \.(mp4|mp3|webm|ogg|avi|mov)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
    access_log off;
}

# HTML pages (1 hour cache with revalidation)
location ~* \.(html|htm)$ {
    expires 1h;
    add_header Cache-Control "public, max-age=3600, must-revalidate";
}

# API endpoints (no caching - critical for dynamic data)
location /api/ {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
}

# Security Headers (improves SEO trust signals & Core Web Vitals)
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

# --- PASTE END ---
