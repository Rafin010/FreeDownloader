# ============================================================
# OPTIMIZED NGINX CONFIGURATION FOR FREEDOWNLOADER.TOP
# Technical SEO: Gzip/Brotli Compression + Cache-Control Headers
# ============================================================
# Place this file at: /etc/nginx/conf.d/freedownloader-optimization.conf
# Or include it inside your existing server blocks.
# After placing: sudo nginx -t && sudo systemctl reload nginx
# ============================================================

# ---- GZIP COMPRESSION ----
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_buffers 16 8k;
gzip_http_version 1.1;
gzip_min_length 256;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/x-javascript
    application/json
    application/ld+json
    application/xml
    application/rss+xml
    application/atom+xml
    application/vnd.ms-fontobject
    application/x-font-ttf
    application/x-font-opentype
    font/opentype
    font/ttf
    font/eot
    font/otf
    image/svg+xml
    image/x-icon;

# ---- BROTLI COMPRESSION (if ngx_brotli module is installed) ----
# Uncomment the following lines if you have Brotli module installed:
# brotli on;
# brotli_comp_level 6;
# brotli_static on;
# brotli_types
#     text/plain
#     text/css
#     text/xml
#     text/javascript
#     application/javascript
#     application/json
#     application/ld+json
#     application/xml
#     image/svg+xml
#     font/opentype
#     font/ttf;

