# FREE STORE ECOSYSTEM DOMAIN ROUTING
# Placed in /etc/nginx/conf.d/ or similar

# 1. Main Free Store Frontend (Python Flask on port 8010)
# This takes over the primary domain.
server {
    listen 80;
    listen 443 ssl;
    server_name freedownloader.top www.freedownloader.top;

    ssl_certificate /etc/letsencrypt/live/freedownloader.top/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/freedownloader.top/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

    location / {
        proxy_pass http://127.0.0.1:8010;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve uploads directly via Nginx for speed
    location /uploads/ {
        alias /root/FreeDownloader/freeStore/uploads/;
        autoindex off;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}

# 2. Legacy Landing Free_D (Node/Static on port 8008)
# Moved to web.freedownloader.top
server {
    listen 80;
    server_name web.freedownloader.top;

    location / {
        proxy_pass http://127.0.0.1:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
