# ═══════════════════════════════════════════════════════════════
# UNIFIED NGINX CONFIG — সব ডোমেইন এক upstream (port 8000)
# ═══════════════════════════════════════════════════════════════
# Place at: /etc/nginx/conf.d/freedownloader.conf
# Then: sudo nginx -t && sudo systemctl reload nginx
# SSL (wildcard): certbot certonly --manual -d *.freedownloader.top -d freedownloader.top
# ═══════════════════════════════════════════════════════════════

upstream unified {
    server 127.0.0.1:8000;
    keepalive 32;
}

# ── HTTP (SSL termination handled per-domain below) ───────────
server {
    listen 80;
    server_name y.freedownloader.top f.freedownloader.top t.freedownloader.top
                i.freedownloader.top p.freedownloader.top admin.freedownloader.top
                donate.freedownloader.top web.freedownloader.top
                store.freedownloader.top
                freedownloader.top www.freedownloader.top;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

# ── HTTPS — Single server block, wildcard cert ────────────────
server {
    listen 443 ssl http2;
    server_name y.freedownloader.top f.freedownloader.top t.freedownloader.top
                i.freedownloader.top p.freedownloader.top admin.freedownloader.top
                donate.freedownloader.top web.freedownloader.top
                store.freedownloader.top
                freedownloader.top www.freedownloader.top;

    # ── Wildcard SSL Certificate (covers *.freedownloader.top + bare domain) ──
    ssl_certificate     /etc/letsencrypt/live/freedownloader.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/freedownloader.top/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Proxy to unified backend ─────────────────────────────
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 10s;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_buffering off;
    proxy_request_buffering off;
    client_max_body_size 10m;

    location / {
        proxy_pass http://unified;
    }

    # ── Uploaded files via Nginx (faster) ────────────────────
    location /uploads/ {
        alias /root/FreeDownloader/freeStore/uploads/;
        autoindex off;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # ── Security Headers ─────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Static Assets Cache ──────────────────────────────────
    location ~* \.(css|js|woff|woff2|ttf|eot|otf)$ {
        proxy_pass http://unified;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|avif)$ {
        proxy_pass http://unified;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    location ~* \.(mp4|mp3|webm|ogg|avi|mov)$ {
        proxy_pass http://unified;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
    }
}
