<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free YouTube Video Downloader</title>
    <meta name="description" content="Download YouTube Videos in HD Free">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-800 antialiased selection:bg-red-200 selection:text-red-900">

    <nav class="bg-white border-b border-gray-100 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-3 cursor-pointer">
                    <img src="https://i.ibb.co.com/DH3LrGb6/free-downloder-logo.jpg" alt="Logo"
                        class="w-10 h-10 rounded-full shadow-sm">
                    <h1 class="font-extrabold text-xl tracking-tight text-gray-900 hidden sm:block">YT Downloader</h1>
                </div>
                <div class="hidden md:flex gap-8">
                    <a href="#"
                        class="text-sm font-medium text-gray-600 hover:text-red-600 transition-colors duration-200">Home</a>
                    <a href="#"
                        class="text-sm font-medium text-gray-600 hover:text-red-600 transition-colors duration-200">More
                        Downloaders</a>
                    <a href="#"
                        class="text-sm font-medium text-gray-600 hover:text-red-600 transition-colors duration-200">Blog</a>
                    <a href="#"
                        class="text-sm font-medium text-gray-600 hover:text-red-600 transition-colors duration-200">Contact</a>
                </div>
                <div class="md:hidden flex items-center">
                    <button class="text-gray-500 hover:text-gray-700 focus:outline-none">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 mt-16 md:mt-24 text-center">
        <h2 class="text-4xl md:text-5xl font-extrabold text-gray-900 mb-4 tracking-tight">
            YouTube Video <span class="text-red-600">Downloader</span>
        </h2>
        <p class="text-lg text-gray-500 mb-10 max-w-2xl mx-auto">
            Download your favorite YouTube videos in high quality (HD, 4K) for free. Fast, secure, and easy to use.
        </p>

        <div
            class="flex flex-col sm:flex-row justify-center max-w-2xl mx-auto shadow-lg rounded-xl md:rounded-full bg-white p-1.5 border border-gray-200 transition-shadow hover:shadow-xl">
            <input id="url" type="url"
                class="w-full px-6 py-4 bg-transparent text-gray-700 focus:outline-none placeholder-gray-400"
                placeholder="Paste YouTube video URL here..." required>
            <button onclick="fetchVideo()"
                class="w-full sm:w-auto mt-2 sm:mt-0 bg-red-600 text-white font-semibold px-8 py-4 rounded-lg md:rounded-full hover:bg-red-700 active:bg-red-800 focus:ring-4 focus:ring-red-200 transition-all flex items-center justify-center gap-2 whitespace-nowrap">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                </svg>
                Download
            </button>
        </div>
        <p class="text-sm text-gray-400 mt-4">By using our service you accept our Terms of Service.</p>
    </main>

    <section id="result" class="max-w-3xl mx-auto mt-12 px-4"></section>

    <div class="max-w-4xl mx-auto mt-20 mb-10 px-4">
        <div
            class="bg-gray-200 rounded-xl p-10 text-center border border-gray-300 border-dashed flex items-center justify-center min-h-[120px]">
            <span class="text-gray-500 font-medium">Advertisement Banner (728x90)</span>
        </div>
    </div>

    <script src="/static/js/main.js"></script>
</body>

</html>
