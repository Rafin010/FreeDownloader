    <script id="seo-schema" type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "url": "https://freedownloader.top/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://freedownloader.top/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- FAQPage Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [{
        "@type": "Question",
        "name": "How to Download YouTube Videos Online?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "You can download YouTube videos easily. Just copy the video link from YouTube, paste it into our YouTube Video Downloader tool, select your preferred quality (like 1080p HD or 4K), and hit download."
        }
      },{
        "@type": "Question",
        "name": "Can I Download YouTube Shorts in HD?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes! Our tool works perfectly as a YouTube Shorts Downloader. Paste the Shorts link, and you can save it directly to your device in HD quality without any watermark."
        }
      },{
        "@type": "Question",
        "name": "Why YouTube Videos Cannot Be Downloaded Sometimes?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Sometimes YouTube videos cannot be downloaded if the video is age-restricted, set to private, the link is broken, or the video has been removed by the creator. Ensure the video is public and the URL is correct."
        }
      },{
        "@type": "Question",
        "name": "What is the Best YouTube Video Downloader?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Free Downloader is considered one of the best YouTube video downloader tools because it is 100% free, requires no app installation, and supports HD, 1080p, 4K, and Shorts video downloads without any watermarks."
        }
      }]
    }
    </script>

    <script>
        tailwind.config = {

    <style>
        body {
            background-color: #0f0f0f;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(255, 20, 60, 0.04), transparent 30%),
                radial-gradient(circle at 85% 30%, rgba(77, 184, 255, 0.04), transparent 30%);
            background-size: 200% 200%;
            animation: ambientBg 15s ease-in-out infinite alternate;
            color: #f1f1f1;
            margin: 0; padding: 0;
            overflow-x: hidden;
        }

        /* Broken thumbnail fallback */
        img.thumb-img { background: #222; }
        img.thumb-img[src=""], img.thumb-img:not([src]) { visibility: hidden; }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #717171;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #a0a0a0;
        }

        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* 7. Custom CSS for expanding description */
        .desc-expanded {
            display: block !important;
            -webkit-line-clamp: unset !important;
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            background: #000;
        }

        .video-wrapper video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* Skeleton Animation */
        .shimmer {
            background: linear-gradient(90deg, #303030 25%, #404040 50%, #303030 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }

            100% {
                background-position: 200% 0;
            }
        }
    </style>
</head>

    <script>
        const state = {
            view: 'home',
            currentMode: 'trending',
            currentVideoId: null,
            videoDataCache: {},
            lastQuery: '',
            trendingCache: [],
            nextPageToken: null,
            isLoadingMore: false,
            isTheatreMode: false
        };

        const els = {
            viewHome: document.getElementById('view-home'),
            viewPlayer: document.getElementById('view-player'),
            videoGrid: document.getElementById('video-grid'),
            feedHeader: document.getElementById('feed-header'),
            relatedContainer: document.getElementById('related-videos-container'),

            playerHtml5: document.getElementById('html5-player'),
            playerLoader: document.getElementById('player-loader'),
            playerTitle: document.getElementById('player-title'),
            playerAuthor: document.getElementById('player-author'),
            playerAuthorSub: document.getElementById('player-author-sub'),
            playerDesc: document.getElementById('player-description'),
            playerViews: document.getElementById('player-views'),
            authorIcon: document.getElementById('author-icon'),
            authorAvatar: document.getElementById('author-avatar'),

            desktopSearch: document.getElementById('desktop-search-form'),

            dlModal: document.getElementById('download-modal'),
            dlModalContent: document.getElementById('download-modal-content'),
            dlFormatsList: document.getElementById('download-formats-list'),
            dlProgressBox: document.getElementById('dl-progress-box')
        };

        let pollTimer = null;

        document.addEventListener('DOMContentLoaded', () => {
            fetchAdsConfig();
            loadTrendingFeed();
            setupEventListeners();
            setupInfiniteScroll();

            window.addEventListener('popstate', (e) => {
                if (e.state && e.state.view === 'player') showPlayerView(e.state.id, false);
                else showHomeView(false);
            });
        });

        // 1. Skeleton Loaders
        function generateGridSkeletons(count = 10) {
            return Array(count).fill(`
                <div class="flex flex-col group animate-pulse cursor-wait">
                    <div class="w-full aspect-video bg-[#222] rounded-xl mb-3 shadow"></div>
                    <div class="flex gap-3 pr-2">
                        <div class="w-9 h-9 rounded-full bg-[#222] shrink-0"></div>
                        <div class="flex flex-col flex-1 gap-2 mt-1">
                            <div class="h-4 bg-[#222] rounded w-full"></div>
                            <div class="h-3 bg-[#222] rounded w-2/3"></div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function generateRelatedSkeletons(count = 5) {
            return Array(count).fill(`
                <div class="flex gap-2 group animate-pulse">
                    <div class="w-[168px] h-[94px] rounded-lg bg-[#222] shrink-0"></div>
                    <div class="flex flex-col flex-1 py-1 gap-2">
                        <div class="h-3 bg-[#222] rounded w-full"></div>
                        <div class="h-3 bg-[#222] rounded w-4/5"></div>
                        <div class="h-2 bg-[#222] rounded w-1/2 mt-2"></div>
                    </div>
                </div>
            `).join('');
        }

        function setupInfiniteScroll() {
            const observer = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting && !state.isLoadingMore && state.nextPageToken) {
                    loadMoreVideos();
                }
            }, { rootMargin: "100px" });

            const sentinel = document.createElement('div');
            sentinel.id = 'scroll-sentinel';
            sentinel.className = 'w-full h-10 col-span-full';
            document.getElementById('view-home').appendChild(sentinel);
            observer.observe(sentinel);
        }

        // 7. Keyboard Shortcuts & Player Controls
        function setupEventListeners() {
            if (els.desktopSearch) {
                els.desktopSearch.addEventListener('submit', (e) => {
                    e.preventDefault();
                    handleSearch(document.getElementById('desktop-search-input').value);
                });
            }

            document.addEventListener('keydown', (e) => {
                if (state.view !== 'player') return;
                // Don't trigger if typing in an input
                if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA') return;

                const vid = els.playerHtml5;
                if (!vid) return;

                switch (e.key) {
                    case ' ':
                        e.preventDefault();
                        vid.paused ? vid.play() : vid.pause();
                        break;
                    case 'f':
                    case 'F':
                        e.preventDefault();
                        if (document.fullscreenElement) {
                            document.exitFullscreen();
                        } else {
                            vid.requestFullscreen?.() || vid.webkitRequestFullscreen?.();
                        }
                        break;
                    case 'ArrowRight':
                        e.preventDefault();
                        vid.currentTime += 5;
                        break;
                    case 'ArrowLeft':
                        e.preventDefault();
                        vid.currentTime -= 5;
                        break;
                    case 'p':
                    case 'P':
                        togglePiP();
                        break;
                    case 't':
                    case 'T':
                        toggleTheatre();
                        break;
                }
            });
        }

        function toggleDescription() {
            const desc = els.playerDesc;
            const toggleText = document.getElementById('desc-toggle-text');
            desc.classList.toggle('desc-expanded');
            toggleText.innerText = desc.classList.contains('desc-expanded') ? 'Show Less' : 'Show More';
        }

        async function togglePiP() {
            try {
                if (document.pictureInPictureElement) {
                    await document.exitPictureInPicture();
                } else if (document.pictureInPictureEnabled && els.playerHtml5.readyState !== 0) {
                    await els.playerHtml5.requestPictureInPicture();
                }
            } catch (err) {
                console.error("PiP failed", err);
            }
        }

        function toggleTheatre() {
            state.isTheatreMode = !state.isTheatreMode;
            const mainContainer = document.getElementById('player-container-main');
            const sidebar = document.getElementById('related-sidebar');

            if (state.isTheatreMode) {
                mainContainer.classList.remove('flex-1');
                mainContainer.classList.add('w-full');
                document.getElementById('view-player').classList.remove('lg:flex-row');
                document.getElementById('view-player').classList.add('flex-col');
                sidebar.classList.remove('lg:w-[400px]');
                sidebar.classList.add('w-full', 'max-w-[1200px]', 'mx-auto');
            } else {
                mainContainer.classList.add('flex-1');
                mainContainer.classList.remove('w-full');
                document.getElementById('view-player').classList.add('lg:flex-row');
                document.getElementById('view-player').classList.remove('flex-col');
                sidebar.classList.add('lg:w-[400px]');
                sidebar.classList.remove('w-full', 'max-w-[1200px]', 'mx-auto');
            }
        }

        // 5. Technical SEO Dynamic Injection
        function updateSEO(title, description, image, urlId) {
            const fullTitle = `${title} - FreeDownloader`;
            document.title = fullTitle;

            const metaTitle = document.querySelector('meta[property="og:title"]');
            if (metaTitle) metaTitle.content = fullTitle;

            const metaDesc = document.querySelector('meta[property="og:description"]');
            if (metaDesc) metaDesc.content = description.substring(0, 150) + '...';

            const metaImage = document.querySelector('meta[property="og:image"]');
            if (metaImage && image) metaImage.content = image;

            // JSON-LD Update
            const schemaScript = document.getElementById('seo-schema');
            if (schemaScript) {
                const schemaData = {
                    "@context": "https://schema.org",
                    "@type": "VideoObject",
                    "name": title,
                    "description": description,
                    "thumbnailUrl": [image],
                    "uploadDate": new Date().toISOString(),
                    "embedUrl": `https://freedownloader.top/?v=${urlId}`
                };
                schemaScript.textContent = JSON.stringify(schemaData);
            }
        }

        function resetPlayerUI() {
            els.playerLoader.classList.remove('hidden');
            els.authorAvatar.classList.add('shimmer');
            els.authorIcon.classList.add('hidden');
            els.playerTitle.innerHTML = '<div class="h-6 w-3/4 shimmer rounded"></div>';
            els.playerAuthor.innerHTML = '<div class="h-4 w-full shimmer rounded mb-1"></div>';
            els.playerAuthorSub.innerHTML = '<div class="h-3 w-2/3 shimmer rounded"></div>';
            els.playerViews.innerHTML = '<div class="h-4 w-20 shimmer rounded inline-block"></div>';
            els.playerDesc.innerHTML = '<div class="h-3 w-full shimmer rounded mb-1"></div><div class="h-3 w-5/6 shimmer rounded"></div>';
            els.playerHtml5.src = '';
            els.playerHtml5.poster = '';
            els.relatedContainer.innerHTML = generateRelatedSkeletons();
        }

        function extractID(urlOrID) {
            const regex = /(?:v=|\/)([0-9A-Za-z_-]{11}).*/;
            const match = urlOrID.match(regex);
            return match ? match[1] : urlOrID;
        }

        function formatDuration(seconds) {
            if (!seconds) return '';
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            return h > 0 ? `${h}:${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}` : `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function formatViews(views) {
            if (!views) return '';
            if (views >= 1000000) return (views / 1000000).toFixed(1).replace('.0', '') + 'M views';
            if (views >= 1000) return (views / 1000).toFixed(1).replace('.0', '') + 'K views';
            return views + ' views';
        }

        function showHomeView(pushHistory = true) {
            state.view = 'home';
            els.viewPlayer.classList.add('hidden');
            els.viewHome.classList.remove('hidden');

            els.playerHtml5.pause();
            els.playerHtml5.src = "";
            document.title = "FreeDownloader - Video Streaming & Downloader";

            if (pushHistory) history.pushState({ view: 'home' }, 'Home', '/');
            document.getElementById('main-scroll-area').scrollTo({ top: 0 });
        }

        function showPlayerView(videoInfo, pushHistory = true) {
            state.view = 'player';
            state.currentVideoId = typeof videoInfo === 'string' ? extractID(videoInfo) : videoInfo.id;

            els.viewHome.classList.add('hidden');
            els.viewPlayer.classList.remove('hidden');

            resetPlayerUI();

            if (typeof videoInfo === 'object') {
                updateSEO(videoInfo.title, videoInfo.title, videoInfo.thumbnail, state.currentVideoId);
                els.playerHtml5.poster = videoInfo.thumbnail || '';
            }

            if (pushHistory) history.pushState({ view: 'player', id: state.currentVideoId }, 'Video', `/?v=${state.currentVideoId}`);
            document.getElementById('main-scroll-area').scrollTo({ top: 0 });

            fetchVideoDetails(state.currentVideoId);
            renderRelatedVideos();
        }

        async function fetchAdsConfig() {
            // Ads disabled - no placeholder images to avoid broken UI
        }

        async function loadTrendingFeed() {
            state.currentMode = 'trending';
            state.nextPageToken = null;
            els.videoGrid.innerHTML = generateGridSkeletons(15);
            els.feedHeader.classList.add('hidden');

            try {
                const res = await fetch('/api/trending');
                if (!res.ok) throw new Error("Network response was not ok");
                const data = await res.json();
                state.nextPageToken = data.nextPageToken || null;
                state.trendingCache = data.results || [];
                renderVideoGrid(state.trendingCache);
            } catch (err) {
                els.videoGrid.innerHTML = '<div class="col-span-full flex flex-col items-center justify-center py-20 text-yt-textSec"><i class="fa-solid fa-satellite-dish text-4xl mb-4 text-yt-border"></i><p>Unable to connect to server. Please check your network.</p></div>';
            }
        }

        async function loadMoreVideos() {
            if (!state.nextPageToken) return;
            state.isLoadingMore = true;

            els.videoGrid.insertAdjacentHTML('beforeend', generateGridSkeletons(5));

            try {
                let url = state.currentMode === 'trending' ? `/api/trending?pageToken=${state.nextPageToken}` : `/api/search?q=${encodeURIComponent(state.lastQuery)}&pageToken=${state.nextPageToken}`;
                const res = await fetch(url);
                const data = await res.json();

                // Remove the skeletons we just appended
                const skeletons = els.videoGrid.querySelectorAll('.animate-pulse');
                skeletons.forEach(s => s.remove());

                state.nextPageToken = data.nextPageToken || null;
                if (data.results) renderVideoGrid(data.results, true);
            } catch (e) {
                const skeletons = els.videoGrid.querySelectorAll('.animate-pulse');
                skeletons.forEach(s => s.remove());
                console.error("Pagination failed:", e);
            }
            state.isLoadingMore = false;
        }

        async function handleSearch(query) {
            query = query.trim();
            if (!query) return;

            if (query.includes('youtube.com/') || query.includes('youtu.be/')) {
                showPlayerView(extractID(query));
                return;
            }

            state.currentMode = 'search';
            state.lastQuery = query;
            state.nextPageToken = null;

            els.viewHome.classList.remove('hidden');
            els.viewPlayer.classList.add('hidden');
            els.videoGrid.innerHTML = generateGridSkeletons(10);
            els.feedHeader.innerText = `Results for "${query}"`;
            els.feedHeader.classList.remove('hidden');

            try {
                const res = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
                const data = await res.json();
                state.nextPageToken = data.nextPageToken || null;

                if (data.results && data.results.length > 0) {
                    renderVideoGrid(data.results);
                } else {
                    els.videoGrid.innerHTML = '<div class="col-span-full text-center py-20"><i class="fa-solid fa-magnifying-glass text-3xl mb-3 text-yt-textSec"></i><p class="text-yt-textSec text-lg">No videos found. Try different keywords.</p></div>';
                }
            } catch (err) {
                els.videoGrid.innerHTML = '<p class="text-yt-red col-span-full text-center py-20">Search failed due to a network error. Please try again.</p>';
            }
        }

        async function fetchVideoDetails(videoId) {
            try {
                const res = await fetch(`/api/video/${videoId}`);
                const data = await res.json();

                if (!res.ok || data.error) {
                    els.playerLoader.innerHTML = `<div class="text-yt-red mb-2"><i class="fa-solid fa-triangle-exclamation text-3xl"></i></div><span class="text-sm font-medium bg-black/80 px-4 py-2 rounded">${data.error || 'Video Unavailable'}</span>`;
                    els.playerLoader.classList.remove('shimmer');
                    return;
                }

                state.videoDataCache[videoId] = data;
                updateSEO(data.title, data.description || data.title, data.thumbnail, videoId);

                // Populate UI removing skeletons
                els.playerTitle.innerText = data.title;
                els.playerAuthor.innerText = data.author || 'Video Creator';
                els.playerAuthorSub.innerText = 'FreeDownloader Creator';
                els.playerViews.innerText = formatViews(data.viewCount);
                els.playerDesc.innerText = data.description || 'No description available for this video.';
                els.authorAvatar.classList.remove('shimmer');
                els.authorIcon.classList.remove('hidden');

                const wrapper = document.querySelector('.video-wrapper');

                if (data.iframe_id) {
                    els.playerLoader.classList.add('hidden');
                    wrapper.innerHTML = `<iframe class="w-full h-full outline-none" src="https://www.youtube.com/embed/${data.iframe_id}?autoplay=1&rel=0" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
                } else if (data.stream_url) {
                    els.playerLoader.classList.add('hidden');
                    // Keep the overlays intact by just updating the video tag
                    const vidTag = document.getElementById('html5-player');
                    vidTag.src = data.stream_url;
                    vidTag.poster = data.thumbnail;
                } else {
                    els.playerLoader.innerHTML = `<div class="bg-black/80 p-4 rounded flex flex-col items-center"><i class="fa-solid fa-video-slash text-yt-textSec mb-2 text-2xl"></i><span class="text-sm">Stream unavailable. Please Download.</span></div>`;
                    els.playerLoader.classList.remove('shimmer');
                }

                renderDownloadOptions(data.download_formats, data.id);
            } catch (e) {
                els.playerLoader.innerHTML = `<span class="text-yt-red bg-black/80 px-4 py-2 rounded">Network Error. Please refresh.</span>`;
                els.playerLoader.classList.remove('shimmer');
            }
        }

        // 4. Download Module with Estimated Size
        function renderDownloadOptions(formats, videoId) {
            const list = document.getElementById('download-formats-list');
            if (!list) return;
            list.innerHTML = '';

            if (!formats || !formats.length) {
                list.innerHTML = '<div class="p-8 text-center text-yt-textSec"><i class="fa-solid fa-ghost mb-3 text-2xl"></i><br>No download formats found.</div>';
                return;
            }

            let vids = formats.filter(q => q.height > 0).sort((a, b) => b.height - a.height);
            let auds = formats.filter(q => q.height === 0);

            function createRow(q, icon, typeText) {
                const btn = document.createElement('button');
                // Calculate Mock Estimated Size based on height/quality if API doesn't provide it
                const estSize = q.filesize ? (q.filesize / 1024 / 1024).toFixed(1) + ' MB' : (q.height ? Math.round(q.height * 0.08) + ' MB' : '12 MB');

                btn.className = `w-full flex justify-between items-center px-5 py-3.5 border-b border-white/5 hover:bg-[#222] transition-colors text-left group`;
                btn.innerHTML = `
                    <div class="flex items-center gap-4">
                        <i class="fa-solid ${icon} text-xl w-6 text-center text-yt-textSec group-hover:text-yt-red transition-colors"></i>
                        <div>
                            <div class="font-bold text-white text-base">${q.resolution}</div>
                            <div class="text-[11px] text-yt-textSec mt-0.5">${q.ext ? q.ext.toUpperCase() : 'MP4'} • ${typeText}</div>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="text-xs font-mono text-gray-400 bg-black/50 px-2 py-1 rounded">${estSize}</span>
                        <div class="w-8 h-8 rounded-full bg-yt-red/20 group-hover:bg-yt-red flex items-center justify-center text-yt-red group-hover:text-white transition-all shrink-0">
                            <i class="fa-solid fa-arrow-down text-sm"></i>
                        </div>
                    </div>
                `;
                btn.onclick = () => triggerNativeDownload(q.height, document.getElementById('player-title').innerText);
                return btn;
            }

            if (vids.length) {
                const head = document.createElement('div');
                head.className = "px-5 py-2 text-[10px] font-bold text-yt-textSec uppercase tracking-wider bg-black/40 backdrop-blur";
                head.innerText = "Video Selection";
                list.appendChild(head);
                vids.forEach(q => list.appendChild(createRow(q, 'fa-video', 'Video + Audio')));
            }

            if (auds.length) {
                const head = document.createElement('div');
                head.className = "px-5 py-2 text-[10px] font-bold text-yt-textSec uppercase tracking-wider bg-black/40 backdrop-blur";
                head.innerText = "Audio Selection";
                list.appendChild(head);
                auds.forEach(q => list.appendChild(createRow(q, 'fa-music', 'Audio Only')));
            }
        }

        function renderVideoGrid(videos, append = false) {
            if (!append) els.videoGrid.innerHTML = '';
            if (!videos.length && !append) return;

            videos.forEach(v => {
                const dur = formatDuration(v.duration);
                const durHTML = dur ? `<span class="absolute bottom-1 right-1 bg-black/90 text-white text-[12px] font-medium px-1.5 py-0.5 rounded">${dur}</span>` : '';

                const card = document.createElement('div');
                card.className = "flex flex-col cursor-pointer group";
                card.onclick = () => showPlayerView(v);

                const thumbUrl = v.thumbnail || `https://i.ytimg.com/vi/${v.id}/hqdefault.jpg`;
                const fallbackThumb = `https://i.ytimg.com/vi/${v.id}/mqdefault.jpg`;
                card.innerHTML = `
                    <div class="relative w-full aspect-video bg-[#181818] rounded-xl overflow-hidden mb-3 border border-white/5 shadow-lg group-hover:shadow-[0_0_20px_rgba(255,20,60,0.15)] transition-all duration-300">
                        <img src="${thumbUrl}" onerror="this.onerror=null;this.src='${fallbackThumb}'" class="thumb-img w-full h-full object-cover group-hover:scale-105 transition-transform duration-300" alt="${v.title}" loading="lazy">
                        ${durHTML}
                        <div class="absolute inset-0 bg-gradient-to-t from-black/40 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                    </div>
                    <div class="flex gap-3 pr-2">
                        <div class="w-9 h-9 rounded-full bg-gradient-to-br from-red-500/20 to-blue-500/20 shrink-0 flex items-center justify-center text-yt-textSec border border-white/5">
                            <i class="fa-solid fa-user text-sm"></i>
                        </div>
                        <div class="flex flex-col overflow-hidden">
                            <h3 class="text-yt-text font-medium text-[15px] leading-snug line-clamp-2 mb-1 group-hover:text-white transition-colors">${v.title}</h3>
                            <div class="text-yt-textSec text-[13px] flex flex-col">
                                <span class="hover:text-yt-text transition-colors">${v.author || 'Unknown'}</span>
                                <span>${formatViews(v.viewCount)}</span>
                            </div>
                        </div>
                    </div>
                `;
                els.videoGrid.appendChild(card);
            });
        }

        function renderRelatedVideos() {
            els.relatedContainer.innerHTML = '';
            let videos = state.trendingCache.slice(0, 15);
            if (!videos.length) {
                els.relatedContainer.innerHTML = '<div class="text-yt-textSec text-sm">No related videos available.</div>';
                return;
            }

            videos.forEach(v => {
                const dur = formatDuration(v.duration);
                const durHTML = dur ? `<span class="absolute bottom-1 right-1 bg-black/90 text-white text-[10px] font-medium px-1 rounded">${dur}</span>` : '';

                const card = document.createElement('div');
                card.className = 'flex gap-2 cursor-pointer group';
                card.onclick = () => showPlayerView(v);

                const rThumb = v.thumbnail || `https://i.ytimg.com/vi/${v.id}/hqdefault.jpg`;
                const rFallback = `https://i.ytimg.com/vi/${v.id}/mqdefault.jpg`;
                card.innerHTML = `
                    <div class="relative w-[168px] h-[94px] rounded-lg overflow-hidden shrink-0 bg-[#181818] border border-white/5">
                        <img src="${rThumb}" onerror="this.onerror=null;this.src='${rFallback}'" class="thumb-img w-full h-full object-cover group-hover:scale-105 transition-transform duration-200" loading="lazy">
                        ${durHTML}
                    </div>
                    <div class="flex flex-col py-0.5 pr-2 w-full">
                        <h3 class="font-medium text-yt-text text-sm leading-tight line-clamp-2 mb-1" title="${v.title}">${v.title}</h3>
                        <p class="text-[11px] text-yt-textSec hover:text-yt-text transition-colors">${v.author || 'Unknown'}</p>
                        <p class="text-[11px] text-yt-textSec">${formatViews(v.viewCount)}</p>
                    </div>
                `;
                els.relatedContainer.appendChild(card);
            });
        }

        function openDownloadModal() {
            const data = state.videoDataCache[state.currentVideoId];
            if (!data || !data.download_formats) {
                alert("Please wait for video details to fully load.");
                return;
            }

            els.dlProgressBox.classList.add('hidden');
            els.dlFormatsList.classList.remove('hidden');
            els.dlModal.classList.remove('hidden');
            setTimeout(() => els.dlModalContent.classList.remove('translate-y-full'), 10);
        }

        function closeDownloadModal() {
            els.dlModalContent.classList.add('translate-y-full');
            setTimeout(() => {
                els.dlModal.classList.add('hidden');
                cancelDownload();
            }, 300);
        }

        function cancelDownload() {
            if (pollTimer) clearInterval(pollTimer);
            els.dlProgressBox.classList.add('hidden');
            els.dlFormatsList.classList.remove('hidden');
        }

        function updateProgressUI(percent, stageText) {
            const circle = document.getElementById('dl-circle-bar');
            const pctText = document.getElementById('dl-percent-text');
            const offset = 283 - (283 * percent) / 100;
            circle.style.strokeDashoffset = offset;
            pctText.innerText = Math.round(percent) + '%';
            document.getElementById('dl-stage').innerText = stageText;
        }

        async function triggerNativeDownload(resHeight, title) {
            els.dlFormatsList.classList.add('hidden');
            els.dlProgressBox.classList.remove('hidden');
            updateProgressUI(5, 'Connecting to server...');

            const videoUrl = `https://www.youtube.com/watch?v=${state.currentVideoId}`;

            try {
                const res = await fetch('/api/download_async', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: videoUrl, res: resHeight, title: title })
                });

                const data = await res.json();
                if (!res.ok || data.error) throw new Error("Fallback to Sync");

                pollTimer = setInterval(async () => {
                    try {
                        const sRes = await fetch(`/api/task_status/${data.task_id}`);
                        const sData = await sRes.json();

                        const stageMap = { queued: 'In Queue...', extracting: 'Extracting Format...', downloading: 'Downloading Media...', merging: 'Finalizing File...', ready: 'Ready!' };
                        updateProgressUI(sData.percent || 10, sData.stage_text || stageMap[sData.stage] || sData.stage || 'Processing...');

                        if (sData.stage === 'ready') {
                            clearInterval(pollTimer);
                            document.getElementById('dl-circle-bar').style.stroke = '#22c55e'; // Green
                            setTimeout(() => {
                                closeDownloadModal();
                                window.location.href = `/api/download_file/${data.task_id}`;
                            }, 1000);
                        } else if (sData.stage === 'error') {
                            throw new Error(sData.error);
                        }
                    } catch (e) {
                        clearInterval(pollTimer);
                        document.getElementById('dl-stage').innerText = 'Error processing file.';
                        document.getElementById('dl-circle-bar').style.stroke = '#ef4444'; // Red
                    }
                }, 1500);

            } catch (err) {
                // Fallback Sync Route if Async fails
                clearInterval(pollTimer);
                updateProgressUI(100, 'Starting Direct Stream...');
                setTimeout(() => {
                    closeDownloadModal();
                    window.location.href = `/api/download?url=${encodeURIComponent(videoUrl)}&res=${resHeight}&title=${encodeURIComponent(title)}`;
                }, 1000);
            }
        }
    </script>
